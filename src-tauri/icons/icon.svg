<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Теплопроект — поток (v2)">
  <title>Теплопроект — концепт A2 v2 (полировка по Vision-QA)</title>

  <!-- Правка 2: фон #0E1726 → #2A3D5A. Не растворяется на тёмном Win-таскбаре,
       контраст с акцентом #FF8A3D остаётся выше 4.5:1 (WCAG AA). -->
  <rect width="256" height="256" rx="56" ry="56" fill="#2A3D5A"/>

  <!-- Правка 1: верхушки → дуги-волны (cubic Bezier).
       Каждая верхушка имеет смещённый peak (frac 0.25 / 0.42 / 0.58 / 0.75)
       — фаза «движется» слева-направо через 4 столбца, складываясь
       в одну непрерывную sin-волну. Амплитуда 12px = 7-15% высоты
       соответствующего столбца (внутри ТЗ-окна 10-15%).

       Низ — полукруг (capsule), как в A2 v1. 4 столбца, ширина 26,
       gap 16, нарастающая высота 80→110→140→170. Цвет акцента,
       количество столбцов, толщина и общая композиция не изменены. -->
  <g fill="#FF8A3D">
    <!-- Section 1: x=52-78, y_top=130, peak_frac=0.25 (apex слева) -->
    <path d="M 52,130 C 55,106 68,106 78,130 L 78,197 A 13,13 0 0 1 52,197 Z"/>

    <!-- Section 2: x=94-120, y_top=100, peak_frac=0.42 -->
    <path d="M 94,100 C 99,76 112,76 120,100 L 120,197 A 13,13 0 0 1 94,197 Z"/>

    <!-- Section 3: x=136-162, y_top=70, peak_frac=0.58 -->
    <path d="M 136,70 C 144,46 157,46 162,70 L 162,197 A 13,13 0 0 1 136,197 Z"/>

    <!-- Section 4: x=178-204, y_top=40, peak_frac=0.75 (apex справа) -->
    <path d="M 178,40 C 188,16 201,16 204,40 L 204,197 A 13,13 0 0 1 178,197 Z"/>
  </g>
</svg>
